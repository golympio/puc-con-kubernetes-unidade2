# Unica adaptacao de implantacao permitida (PRD 6.1): o upstream deixa de
# apontar backend1/backend2 (Docker Compose da U1) e passa a apontar o Service
# ClusterIP do backend no Kubernetes. O DNS con-guess-backend resolve para o
# Service, que balanceia entre os Pods do Deployment con-guess-backend.
upstream backend_api {
    server con-guess-backend:5000;
}

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /create {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /guess/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
