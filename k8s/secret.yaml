# CREDENCIAL DIDATICA DE LABORATORIO — NAO e um segredo real.
# `secretpass` e a senha descartavel do Postgres local desta atividade, herdada
# da Unidade 1. Fica versionada em /k8s por REPRODUTIBILIDADE: o avaliador precisa
# subir o ambiente self-contained seguindo apenas o README. Um Secret do Kubernetes
# e base64 (codificacao, nao criptografia). Nenhuma credencial real (Docker Hub,
# GitHub, nuvem) e versionada aqui. Ver PRD 8.4 / NF5.
apiVersion: v1
kind: Secret
metadata:
  name: con-guess-secret
  labels:
    app.kubernetes.io/part-of: con-guess
type: Opaque
stringData:
  # Usada pelo backend Flask (FLASK_DB_PASSWORD -> config DB_PASSWORD).
  FLASK_DB_PASSWORD: "secretpass"
  # Usada pela imagem oficial do Postgres para inicializar o banco.
  POSTGRES_PASSWORD: "secretpass"
