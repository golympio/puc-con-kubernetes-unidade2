apiVersion: v1
kind: ConfigMap
metadata:
  name: con-guess-config
  labels:
    app.kubernetes.io/part-of: con-guess
data:
{{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
---
# CREDENCIAL DIDATICA DE LABORATORIO — nao e segredo real (ver values.yaml / PRD 8.4).
apiVersion: v1
kind: Secret
metadata:
  name: con-guess-secret
  labels:
    app.kubernetes.io/part-of: con-guess
type: Opaque
stringData:
  FLASK_DB_PASSWORD: {{ .Values.secret.password | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.password | quote }}
