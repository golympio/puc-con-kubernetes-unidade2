apiVersion: apps/v1
kind: Deployment
metadata:
  name: con-guess-backend
  labels:
    app: con-guess-backend
    app.kubernetes.io/part-of: con-guess
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: con-guess-backend
  template:
    metadata:
      labels:
        app: con-guess-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: con-guess-config
            - secretRef:
                name: con-guess-secret
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: con-guess-backend
  labels:
    app: con-guess-backend
    app.kubernetes.io/part-of: con-guess
spec:
  type: ClusterIP
  selector:
    app: con-guess-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: con-guess-backend
  labels:
    app: con-guess-backend
    app.kubernetes.io/part-of: con-guess
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: con-guess-backend
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercentage }}
