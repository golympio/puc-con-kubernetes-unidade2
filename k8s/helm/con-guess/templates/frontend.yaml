apiVersion: apps/v1
kind: Deployment
metadata:
  name: con-guess-frontend
  labels:
    app: con-guess-frontend
    app.kubernetes.io/part-of: con-guess
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: con-guess-frontend
  template:
    metadata:
      labels:
        app: con-guess-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          ports:
            - containerPort: 80
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: con-guess-frontend
  labels:
    app: con-guess-frontend
    app.kubernetes.io/part-of: con-guess
spec:
  type: ClusterIP
  selector:
    app: con-guess-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
