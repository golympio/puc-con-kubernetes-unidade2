apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: con-guess-db
  labels:
    app: con-guess-db
    app.kubernetes.io/part-of: con-guess
spec:
  serviceName: con-guess-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: con-guess-db
  template:
    metadata:
      labels:
        app: con-guess-db
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: con-guess-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: con-guess-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: con-guess-secret
                  key: POSTGRES_PASSWORD
          resources:
{{ toYaml .Values.db.resources | indent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.db.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.db.storageSize }}
---
# Headless Service governante do StatefulSet (clusterIP: None).
apiVersion: v1
kind: Service
metadata:
  name: con-guess-db-headless
  labels:
    app: con-guess-db
    app.kubernetes.io/part-of: con-guess
spec:
  clusterIP: None
  selector:
    app: con-guess-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Service ClusterIP usado pelo backend (con-guess-db:5432).
apiVersion: v1
kind: Service
metadata:
  name: con-guess-db
  labels:
    app: con-guess-db
    app.kubernetes.io/part-of: con-guess
spec:
  type: ClusterIP
  selector:
    app: con-guess-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
