# Service ClusterIP do banco, usado pelo BACKEND para conectar em
# con-guess-db:5432 (FLASK_DB_HOST=con-guess-db no ConfigMap).
apiVersion: v1
kind: Service
metadata:
  name: con-guess-db
  labels:
    app: con-guess-db
    app.kubernetes.io/part-of: con-guess
spec:
  type: ClusterIP
  selector:
    app: con-guess-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
